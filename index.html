<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1e3c72">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

/* Navigation Bar */
.navbar{display:flex;justify-content:space-between;align-items:center;width:100%;padding:10px 15px;background:linear-gradient(135deg,#1e3c72,#2a5298);color:white;box-shadow:0 4px 6px rgba(0,0,0,0.2);}

.nav-left span{font-weight:600;font-size:16px;}
.nav-right button.exit-btn{background:transparent;border:none;color:white;font-size:18px;cursor:pointer;transition:0.3s;}
.nav-right button.exit-btn:hover{opacity:0.8;}

/* Install Button */
.install-btn{background:#ffd700;color:#2a3b70;font-weight:700;padding:12px;border:none;border-radius:10px;font-size:16px;cursor:pointer;transition:all 0.3s ease;margin:15px 0;animation:btnFade 1.5s infinite alternate;}
.install-btn.hide{display:none;}
@keyframes btnFade{
  0%{transform:translateY(0);}
  50%{transform:translateY(-3px);}
  100%{transform:translateY(0);}
}

/* Main container */
.container{display:flex;justify-content:center;align-items:center;padding:15px;width:100%;}
.card{background:linear-gradient(135deg,#1e3c72,#2a5298);border-radius:20px;padding:25px;display:flex;flex-direction:column;gap:15px;box-shadow:0 20px 40px rgba(0,0,0,0.3);width:100%;max-width:400px;text-align:center;color:white;}
.card h2.title{font-size:24px;font-weight:700;margin-bottom:5px;line-height:1.2;}
.card p.subtitle{font-size:15px;font-weight:400;opacity:0.8;margin-top:0;line-height:1.3;margin-bottom:10px;}

input::placeholder{color:rgba(255,255,255,0.6);}
button.calculate-btn{background:#ffffff;color:#2a5298;font-weight:600;border:none;border-radius:10px;padding:12px;font-size:16px;cursor:pointer;transition:all 0.3s ease;}
button.calculate-btn:hover{background:#e0e0e0;}

/* Output box */
.age-box{display:flex;gap:10px;justify-content:space-between;height:0;overflow:hidden;transition:height 0.3s ease;}
.age-box.show{height:auto;}
.age-item{flex:1;background:rgba(255,255,255,0.2);padding:15px 5px;border-radius:12px;opacity:0; transform:translateY(10px); transition:all 0.5s ease;}
.age-item.show{opacity:1; transform:translateY(0);}
.age-item h3{font-size:20px;}

/* Footer */
.footer{margin-top:15px;font-size:13px;color:white;display:flex;flex-direction:column;align-items:center;gap:5px;}
.footer img{width:30px;height:30px;border-radius:50%;}

</head>
<body>

<!-- Navigation Bar -->
<div class="navbar">
  <div class="nav-left">
    <img src="icon-192.png" alt="Logo" class="logo">
    <span>AgeDekho</span>
  </div>
  <div class="nav-right">
    <button class="exit-btn" onclick="exitApp()">&#10005;</button>
  </div>
</div>

<!-- Install Button -->
<button id="installBtn" class="install-btn hide">Install AgeDekho App</button>

<!-- Main container -->
<div class="container">
  <div class="card">
    <h2 class="title">বর্তমান বয়স দেখুন</h2>
    <p class="subtitle">জন্ম তারিখ দিয়ে এখনই নির্ণয় করুন</p>
    <input type="date" id="dob" placeholder="আপনার জন্ম তারিখ নির্বাচন করুন">
    <button class="calculate-btn" onclick="calculateAge()">বয়স নির্ণয় করুন</button>

    <!-- Output Box -->
    <div class="age-box" id="ageBox">
      <div class="age-item"><h3 id="years">0</h3><p>বছর</p></div>
      <div class="age-item"><h3 id="months">0</h3><p>মাস</p></div>
      <div class="age-item"><h3 id="days">0</h3><p>দিন</p></div>
    </div>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  <img src="hasan.jpg" alt="H.I. Hasan">
  Developed by H.I. Hasan
</div>

<script>
// Exit Confirmation
function exitApp(){
  if(confirm("আপনি কি সত্যিই বের হতে চান?")){
    window.close();
  }
}

// Install Button Prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').classList.remove('hide');
});
document.getElementById('installBtn').addEventListener('click', async () => {
  document.getElementById('installBtn').classList.add('hide');
  if(deferredPrompt){
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    if(outcome === 'accepted'){ alert("App সফলভাবে ইনস্টল হয়েছে!"); }
  }
});

// Age Calculation
function calculateAge(){
  const dobValue=document.getElementById("dob").value;
  if(!dobValue){alert("অনুগ্রহ করে জন্ম তারিখ নির্বাচন করুন"); return;}
  const dob=new Date(dobValue);
  const today=new Date();
  if(dob > today){ alert("ভবিষ্যতের তারিখ নির্বাচন করা যাবে না"); return;}
  let years=today.getFullYear()-dob.getFullYear();
  let months=today.getMonth()-dob.getMonth();
  let days=today.getDate()-dob.getDate();
  if(days<0){months--; const lastMonth=new Date(today.getFullYear(),today.getMonth(),0); days+=lastMonth.getDate();}
  if(months<0){years--; months+=12;}
  document.getElementById("years").innerText=years;
  document.getElementById("months").innerText=months;
  document.getElementById("days").innerText=days;

  const ageBox = document.getElementById('ageBox');
  ageBox.classList.add('show');
  const items = document.querySelectorAll('.age-item');
  items.forEach((item, i)=>{
    setTimeout(()=>{ item.classList.add('show'); }, i*150);
  });
}

// Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(reg=>{
    console.log("Service Worker Registered:", reg.scope);
  }).catch(err=>{
    console.log("SW registration failed:", err);
  });
}
</script>
</body>
</html>
